name: Skill checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Check Python syntax
        run: python -m compileall -q demo skills
      - name: Test raw-data figure workbench
        run: python skills/make-sci-data-figures/scripts/test_figure_workbench.py
      - name: Test scientific-image standardization
        run: python skills/standardize-sci-images/scripts/test_standardize_images.py
